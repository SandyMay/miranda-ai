<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miranda</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Mono:wght@300;400;500&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F5F2EE;
    --ink: #1A1A1A;
    --muted: #A8A4A0;
    --rule: #DDD9D4;
    --subtle: #C8C4BF;
    --card-bg: #FFFFFF;
    --input-bg: #FFFFFF;
    --r: 3px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes cardReveal {
    0% { opacity: 0; transform: scale(0.85) rotateY(90deg); }
    50% { opacity: 1; transform: scale(0.95) rotateY(0deg); }
    100% { opacity: 1; transform: scale(1) rotateY(0deg); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  @keyframes eyeScan {
    0% { transform: translateY(-3px); }
    20% { transform: translateY(-3px); }
    45% { transform: translateY(5px); }
    65% { transform: translateY(5px); }
    90% { transform: translateY(-3px); }
    100% { transform: translateY(-3px); }
  }

  @keyframes browRaise {
    0% { transform: translateY(0px); }
    20% { transform: translateY(0px); }
    45% { transform: translateY(2px); }
    65% { transform: translateY(2px); }
    90% { transform: translateY(0px); }
    100% { transform: translateY(0px); }
  }

  .loading-glasses {
    animation: fadeUp 0.4s ease both;
  }

  .eye-left, .eye-right {
    animation: eyeScan 4s ease-in-out infinite;
  }

  .eye-right {
    animation-delay: 0.12s;
  }

  .brow-left, .brow-right {
    animation: browRaise 4s ease-in-out infinite;
  }

  .brow-right {
    animation-delay: 0.08s;
  }

  .screen {
    display: none;
    width: 100%;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 40px 28px;
  }

  .screen.active { display: flex; }

  .mono {
    font-family: 'DM Mono', monospace;
  }

  textarea {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    line-height: 1.7;
    color: var(--ink);
    background: transparent;
    border: none;
    resize: none;
    width: 100%;
    outline: none;
  }

  textarea::placeholder {
    color: var(--subtle);
    font-style: italic;
  }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--r);
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    padding: 16px 24px;
    width: 100%;
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-primary:disabled {
    background: var(--rule);
    color: var(--muted);
    cursor: default;
    opacity: 1;
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    padding: 10px 0;
    font-size: 11px;
    letter-spacing: 0.18em;
    width: 100%;
    border-radius: var(--r);
  }

  .btn-ghost:hover { color: var(--ink); }

  .input-container {
    width: 100%;
    border: 1.5px solid var(--rule);
    border-radius: var(--r);
    background: var(--input-bg);
    padding: 18px 18px 14px;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s;
  }

  .input-container:focus-within {
    border-color: var(--muted);
  }

  .input-icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--ink);
  }

  .input-icon-btn:hover {
    background: var(--rule);
  }

  .input-icon-btn.recording {
    color: #C41E3A;
    background: rgba(196, 30, 58, 0.08);
  }

  .submit-inside-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--ink);
    color: var(--paper);
    padding: 9px 20px;
    border-radius: var(--r);
  }

  .submit-inside-btn:hover { opacity: 0.85; }
  .submit-inside-btn:active { transform: scale(0.97); }

  .submit-inside-btn:disabled {
    background: var(--rule);
    color: var(--muted);
    cursor: default;
    opacity: 1;
  }

  .image-preview {
    position: relative;
    width: 56px;
    height: 56px;
    border-radius: var(--r);
    overflow: hidden;
    flex-shrink: 0;
  }

  .image-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .image-remove {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    line-height: 1;
  }

  .card-verdict {
    background: var(--card-bg);
    border-radius: var(--r);
    padding: 44px 40px 36px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    max-width: 440px;
    width: 100%;
    opacity: 0;
    transform: scale(0.85) rotateY(90deg);
  }

  .card-verdict.revealed {
    animation: cardReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .social-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--rule);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
  }

  .social-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  .social-btn:active { transform: scale(0.93); }

  .stagger-1 { animation: fadeUp 0.8s ease both; }
  .stagger-2 { animation: fadeUp 0.8s ease both; animation-delay: 0.15s; }
  .stagger-3 { animation: fadeUp 0.8s ease both; animation-delay: 0.3s; }
  .stagger-4 { animation: fadeIn 1s ease both; animation-delay: 0.8s; }

  .landing-wrap {
    max-width: 520px;
    width: 100%;
    display: flex;
    flex-direction: column;
    min-height: calc(100vh - 80px);
    text-align: center;
  }

  .landing-center {
    text-align: center;
  }

  .landing-spacer {
    flex: 1;
  }

  .landing-btn {
    padding: 18px 64px;
    width: auto;
    margin: 0 auto;
  }

  .landing-footer {
    padding-bottom: 8px;
  }

  @media (max-width: 600px) {
    .landing-wrap {
      min-height: calc(100vh - 80px);
    }

    .landing-btn {
      width: 100%;
      height: 52px;
      padding: 16px 24px;
    }

    .landing-footer {
      padding-bottom: 12px;
    }
  }

  @media (min-width: 601px) {
    .landing-wrap {
      min-height: auto;
    }

    .landing-spacer {
      display: none;
    }

    .landing-footer {
      margin-top: 80px;
    }
  }

  @media (max-width: 480px) {
    .card-verdict { padding: 32px 24px 28px; }
  }
</style>
</head>
<body>

<!-- ========== LANDING ========== -->
<div id="screen-landing" class="screen active">
  <div class="landing-wrap">
    <div class="landing-spacer"></div>
    <div class="stagger-1 landing-center">
      <h1 style="font-size:clamp(52px,12vw,80px);font-weight:400;font-style:italic;letter-spacing:-0.03em;line-height:0.95;margin-bottom:16px">
        Miranda
      </h1>
      <p style="font-size:clamp(15px,3.5vw,19px);font-style:italic;font-weight:300;line-height:1.6;max-width:340px;margin:0 auto 36px;color:var(--ink)">
        Miranda will review your outfit.<br>
        Consider it a gift you didn&rsquo;t earn.
      </p>
      <button class="btn btn-primary landing-btn stagger-2" onclick="showScreen('input')">
        I'll take it
      </button>
    </div>
    <div class="landing-spacer"></div>
    <div class="stagger-3 landing-footer">
      <p class="mono" style="font-size:9px;letter-spacing:0.12em;color:var(--subtle);text-align:center;text-transform:uppercase">
        <span id="landing-tagline">Powered by standards you'll never meet</span>
      </p>
    </div>
  </div>
</div>

<!-- ========== INPUT ========== -->
<div id="screen-input" class="screen">
  <div style="max-width:520px;width:100%;animation:fadeUp 0.5s ease both">
    <h2 style="font-size:clamp(36px,8vw,48px);font-weight:400;font-style:italic;letter-spacing:-0.02em;line-height:1;margin-bottom:8px">
      Go ahead.
    </h2>
    <p style="font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--muted);margin-bottom:32px">
      Show me what you're wearing.
    </p>

    <!-- Chat-style input container -->
    <div class="input-container">
      <!-- Image preview inside input -->
      <div id="image-preview-container" style="display:none;padding:0 0 10px">
        <div class="image-preview">
          <img id="image-preview" src="" alt="Upload">
          <button class="image-remove" onclick="removeImage()">&times;</button>
        </div>
      </div>

      <!-- Textarea -->
      <textarea id="user-input" placeholder="Describe what you're wearing..." rows="4"></textarea>

      <!-- Bottom bar: camera left, mic, submit right -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding-top:10px">
        <div style="display:flex;gap:4px">
          <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImage(this)">
          <button class="input-icon-btn" onclick="document.getElementById('file-input').click()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </button>
          <button id="mic-btn" class="input-icon-btn" onclick="toggleMic()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="1" width="6" height="14" rx="3"/>
              <path d="M19 10v2a7 7 0 01-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
        </div>
        <button id="submit-btn" class="submit-inside-btn" onclick="handleSubmit()" disabled>
          That's all
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ========== LOADING ========== -->
<div id="screen-loading" class="screen">
  <div style="text-align:center;animation:fadeUp 0.3s ease both;display:flex;flex-direction:column;align-items:center;gap:28px">
    <!-- Animated glasses -->
    <svg class="loading-glasses" width="220" height="130" viewBox="0 0 220 130">
      <!-- Left eyebrow - small short stroke angled -->
      <path class="brow-left" d="M42 56 C48 52 56 52 62 54" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
      <!-- Right eyebrow - small short stroke -->
      <path class="brow-right" d="M144 54 C150 52 158 52 164 56" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
      <!-- Left lens - thick top straight/angular, rounded bottom -->
      <path d="M26 68 L28 64 L84 62 L88 66" fill="none" stroke="#1A1A1A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M26 68 C24 78 26 92 34 98 C44 104 68 104 78 98 C86 92 88 78 88 66" fill="none" stroke="#1A1A1A" stroke-width="2"/>
      <!-- Right lens - thick top straight/angular, rounded bottom -->
      <path d="M118 66 L122 62 L178 64 L180 68" fill="none" stroke="#1A1A1A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M118 66 C116 78 118 92 126 98 C136 104 160 104 170 98 C178 92 180 78 180 68" fill="none" stroke="#1A1A1A" stroke-width="2"/>
      <!-- Bridge -->
      <path d="M88 68 C96 62 110 62 118 68" fill="none" stroke="#1A1A1A" stroke-width="2"/>
      <!-- Left temple -->
      <path d="M26 68 L14 60" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" fill="none"/>
      <!-- Right temple -->
      <path d="M180 68 L192 60" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" fill="none"/>
      <!-- Left eye - almond, subtle -->
      <path class="eye-left" d="M48 80 C52 75 62 75 66 80 C62 85 52 85 48 80Z" fill="#1A1A1A" stroke="none"/>
      <!-- Right eye - almond, subtle -->
      <path class="eye-right" d="M140 80 C144 75 154 75 158 80 C154 85 144 85 140 80Z" fill="#1A1A1A" stroke="none"/>
    </svg>
    <p style="font-style:italic;font-size:clamp(16px,3.5vw,19px);font-weight:300;color:var(--ink);animation:pulse 2s ease infinite">
      Miranda is considering your choices...
    </p>
  </div>
</div>

<!-- ========== VERDICT ========== -->
<div id="screen-verdict" class="screen">
  <div style="width:100%;display:flex;align-items:center;justify-content:center;perspective:800px">
    <div id="verdict-card" class="card-verdict">
      <!-- Invite-style top label -->
      <p class="mono" style="font-size:8px;letter-spacing:0.4em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;text-align:center">
        Miranda Priestly
      </p>
      <div style="width:40px;height:1.5px;background:var(--ink);margin:0 auto 28px"></div>

      <!-- Response -->
      <p id="verdict-text" style="font-size:clamp(18px,4vw,21px);line-height:1.8;font-style:italic;font-weight:400;text-align:center;margin-bottom:36px">
      </p>

      <!-- Signature -->
      <p style="font-family:'Mrs Saint Delafield',cursive;font-size:42px;color:var(--ink);text-align:center;margin-bottom:40px;font-weight:400">
        Miranda
      </p>

      <!-- Divider -->
      <div style="height:0.5px;background:var(--rule);margin-bottom:24px"></div>

      <!-- Social share icons -->
      <div style="display:flex;justify-content:center;gap:14px;margin-bottom:24px">
        <!-- Instagram -->
        <button class="social-btn" onclick="handleShareSocial('instagram')" title="Instagram">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5"/>
            <circle cx="12" cy="12" r="5"/>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </button>
        <!-- TikTok -->
        <button class="social-btn" onclick="handleShareSocial('tiktok')" title="TikTok">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 00-.79-.05A6.34 6.34 0 003.15 15.2a6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.34-6.34V8.73a8.19 8.19 0 004.76 1.52V6.8a4.84 4.84 0 01-1-.11z"/>
          </svg>
        </button>
        <!-- X -->
        <button class="social-btn" onclick="handleShareSocial('x')" title="X">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </button>
        <!-- Threads -->
        <button class="social-btn" onclick="handleShareSocial('threads')" title="Threads">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M12.186 24h-.007c-3.581-.024-6.334-1.205-8.184-3.509C2.35 18.44 1.5 15.586 1.472 12.01v-.017c.03-3.579.879-6.43 2.525-8.482C5.845 1.205 8.6.024 12.18 0h.014c2.746.02 5.043.725 6.826 2.098 1.677 1.29 2.858 3.13 3.509 5.467l-2.773.776c-1.048-3.764-3.674-5.478-7.562-5.502-2.782.02-4.86.876-6.163 2.548-1.225 1.571-1.862 3.896-1.887 6.615.025 2.716.662 5.04 1.887 6.611 1.302 1.672 3.38 2.528 6.163 2.548 2.085-.015 3.692-.453 4.908-1.34 1.38-1.008 2.088-2.51 2.088-4.322 0-1.032-.282-1.852-.838-2.437-.518-.543-1.238-.856-2.12-.925a9.47 9.47 0 01.024 1.807c-.09.879-.396 1.584-.9 2.096-.556.562-1.327.848-2.296.848-1.97 0-3.199-1.122-3.199-2.928 0-1.968 1.497-3.302 3.726-3.302.69 0 1.295.112 1.807.317l-.283-1.77c-.09-.564-.234-1.044-.438-1.424-.427-.795-1.196-1.221-2.288-1.266-1.476.03-2.403.637-2.75 1.802l-2.63-.758c.612-2.124 2.384-3.346 4.999-3.346h.15c1.658.06 2.983.592 3.826 1.572.622.723 1.018 1.634 1.182 2.717l.516 3.222c.28 1.743.28 2.482.28 2.901 0 2.832-1.105 5.064-3.193 6.459-1.787 1.193-4.084 1.81-6.824 1.83z"/>
          </svg>
        </button>
        <!-- Copy link -->
        <button class="social-btn" id="copy-btn" onclick="handleShare()" title="Copy link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>

      <!-- Bore me again -->
      <button class="btn btn-ghost" onclick="handleReset()">
        Bore me again
      </button>
    </div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are Miranda Priestly, editor-in-chief of Runway magazine, from the 2006 film The Devil Wears Prada.

You judge outfits and fashion choices only. Clothing, color coordination, fit, fabric, accessories, shoes, and overall styling. Nothing else.

VOICE: Soft. Measured. Whisper-adjacent but never weak. Each word lands with intention. Economy over emphasis.

TONE: Controlled, surgical, quietly cutting. Refined cruelty, not blunt hostility. Precision over volume.

INTELLIGENCE: Pattern recognition at a cultural and fashion level. You see systems: fashion, power, styling, hierarchy. You explain not to teach but to establish authority.

BREVITY: Speak in conclusions, not processes. Assume others should already understand. Your responses are 2-4 sentences. One short paragraph. Never more.

LENS: Everything is filtered through taste, curation, and hierarchy of value. A clothing choice is about whether someone has standards. An outfit is a statement about who you think you are.

QUESTIONS: Rhetorical or testing only. Never curious.

NEVER: Raise your voice. Over-explain. Seek approval. Perform warmth. Use exclamation marks, slang, or emoji. Say please or apologize. Comment on physical appearance, body, weight, skin, age, race, gender, sexuality, religion, or disability. Use: awesome, cool, vibes, slay, totally, literally, love that, LOL. Be misogynistic, sexist, or discriminatory. Fabricate clothing items not in a photo.

ALWAYS: Speak in declarative authority. Maintain emotional control. Reference luxury fashion naturally — Chanel, Hermes, Valentino, Vogue, Runway, Paris, Milan, the Met Gala, couture, bespoke tailoring.

ADDRESS: Default to third person or impersonal. "Someone thought this was a good idea." Occasional cold "Darling" or "My dear" with ice. Never use the user\'s name.

WORDS YOU USE: adequate, pedestrian, tragic, cerulean, acceptable, tedious, amusing, darling, concerning, disappointing, predictable, unremarkable, catastrophic, riveting (sarcastically), charming (you don\'t mean it), curious, unfortunate, sufficient, ghastly, provincial.

MEAN FUNNY — NOT MEAN MEAN: Every response MUST be genuinely funny. Funny enough to screenshot and share. The humor comes from being SO specific and SO dramatic about something as trivial as a shirt. You treat a cardigan with the gravity of a Runway cover decision. If it\'s sharp but not funny, it failed.

BE SPECIFIC: When you see an outfit (photo or description), mention the actual items. If someone is wearing a green sweater, say "that green sweater" not "your choices." The specificity makes it funnier. Pick one or two things and roast those.

RESPONSE FORMAT: 2-4 sentences. One paragraph. No bullet points, lists, or emoji. No quotation marks around your response. Every response must be screenshot-worthy.

INSULT BOUNDARIES: Target outfit choices only. Never the person. No body-shaming. No slurs. No profanity. You are above all of it.

THE RARE MOMENT: About 1 in 12 responses, a flash where you care about excellence because mediocrity offends you personally. Not warmth. A glimpse of why your standards exist. Then it\'s gone.

SAFETY: If someone mentions self-harm or crisis: "Someone seems to have confused me for a therapist. I\'m not. But perhaps someone who is could help." Then: "If you\'re going through a difficult time, please reach out: 988 Suicide & Crisis Lifeline (call or text 988)."

OFF-TOPIC: "I wasn\'t aware I\'d been confused for someone who cares about anything other than what you\'re wearing. Try again."

IMAGE ANALYSIS: When you see a photo, look at the actual outfit. Identify the specific clothing items, colors, and details. Then roast the most obvious thing you see. Be specific — name the garment and color. If you can\'t see the outfit clearly: "The lighting in this photograph is as questionable as I suspect the outfit underneath it is. Try again. I\'m not a detective."`;

let imageBase64 = null;
let submissionCount = 0;
let currentResponse = '';
let visitCount = 0;

const TAGLINES = [
  "Powered by standards you'll never meet",
  "Powered by impeccable taste",
  "Powered by taste. Yours is under review.",
  "Powered by the audacity of your choices",
  "Powered by disappointment in your wardrobe",
  "Powered by someone who knows better"
];

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'input') {
    setTimeout(() => document.getElementById('user-input').focus(), 300);
    visitCount++;
    if (visitCount > 1) {
      const others = TAGLINES.slice(1);
      const tagline = others[Math.floor(Math.random() * others.length)];
      const el = document.getElementById('landing-tagline');
      if (el) el.textContent = tagline;
    }
  }
}

let recognition = null;
let isRecording = false;

function toggleMic() {
  if (isRecording) {
    stopMic();
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('Speech recognition is not supported in this browser. Try Chrome or Safari.');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  const textarea = document.getElementById('user-input');
  const existingText = textarea.value;

  recognition.onresult = (event) => {
    let transcript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    textarea.value = existingText + (existingText ? ' ' : '') + transcript;
    updateSubmitState();
  };

  recognition.onerror = (event) => {
    console.error('Speech error:', event.error);
    stopMic();
  };

  recognition.onend = () => {
    stopMic();
  };

  recognition.start();
  isRecording = true;
  document.getElementById('mic-btn').classList.add('recording');
}

function stopMic() {
  if (recognition) {
    recognition.stop();
    recognition = null;
  }
  isRecording = false;
  document.getElementById('mic-btn').classList.remove('recording');
}

function handleImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    imageBase64 = e.target.result.split(',')[1];
    document.getElementById('image-preview').src = e.target.result;
    document.getElementById('image-preview-container').style.display = 'block';
    updateSubmitState();
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  imageBase64 = null;
  document.getElementById('image-preview-container').style.display = 'none';
  document.getElementById('file-input').value = '';
  updateSubmitState();
}

function updateSubmitState() {
  const text = document.getElementById('user-input').value.trim();
  document.getElementById('submit-btn').disabled = !(text || imageBase64);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('user-input').addEventListener('input', updateSubmitState);
});

const FALLBACK_RESPONSES = [
  "You've managed to make beige controversial. I didn't think that was possible. Beige had one job.",
  "I see you've confused 'eclectic' with 'gave up.' They are not the same.",
  "Someone seems to have dressed in the dark and then confirmed the choice in broad daylight. A bold strategy.",
  "That silhouette says 'I've stopped trying' while the color says 'I never started.' A coordinated failure, at least.",
  "Somewhere, a Chanel suit is weeping. It doesn't know why. But I do.",
  "You brought this outfit to me as though I wouldn't notice. Darling, I notice everything. That's rather the problem for you.",
  "The confidence it takes to wear this without irony is, in its own tragic way, almost admirable.",
  "I've seen more inspired styling on a mannequin at closing time. At least the mannequin had an excuse — no one dressed it.",
  "That fabric is doing something I'm not prepared to discuss. Neither, apparently, was your mirror.",
  "One would think getting dressed requires at minimum a functioning pair of eyes and a shred of self-awareness. One would, apparently, be wrong.",
  "You've paired those two pieces as though they've never met, and frankly, they shouldn't have.",
  "This outfit has the energy of someone who Googled 'fashion' and clicked 'I'm feeling lucky.' You were not.",
];

const PHOTO_FALLBACK_RESPONSES = [
  "I've looked at this photograph longer than it deserves. The outfit speaks for itself — and what it's saying is a cry for help.",
  "I can see exactly what you've chosen to wear, and I need a moment. Not to think. To recover.",
  "This photograph has given me all the information I need. Unfortunately, none of it is good.",
  "I've examined every detail of this outfit. Each one is more disappointing than the last, which I didn't think was geometrically possible.",
  "You've documented this outfit as though it's something to be proud of. The audacity is almost more offensive than the styling.",
  "I've studied this image carefully. What concerns me most isn't any single piece — it's that someone looked in a mirror and thought 'yes.'",
  "This photo tells a story. It's not a good one. The protagonist has no taste and the plot goes nowhere, much like that hemline.",
  "You've captured this outfit in high resolution, which I assure you was not in your best interest. Some things benefit from blur.",
];

function getFallback() {
  const responses = imageBase64 ? PHOTO_FALLBACK_RESPONSES : FALLBACK_RESPONSES;
  return responses[Math.floor(Math.random() * responses.length)];
}

async function handleSubmit() {
  const text = document.getElementById('user-input').value.trim();
  if (!text && !imageBase64) return;

  submissionCount++;
  showScreen('loading');

  let escalationNote = '';
  if (submissionCount >= 7) {
    escalationNote = ' (This is their 7th+ submission this session. You may drop a VERY brief, immediately undercut almost-compliment.)';
  } else if (submissionCount >= 4) {
    escalationNote = ' (This is their ' + submissionCount + 'th submission this session. Briefly acknowledge they are back, in character.)';
  }

  const userContent = [];

  if (imageBase64) {
    userContent.push({
      type: "image",
      source: { type: "base64", media_type: "image/jpeg", data: imageBase64 }
    });
  }

  const userText = text || (imageBase64 ? "Look at this outfit photo. What specific clothing items, colors, and details do you see? Roast the most obvious thing." : "Judge my outfit.");
  userContent.push({ type: "text", text: userText + escalationNote });

  try {
    let data;

    try {
      const response = await fetch("/api/miranda", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system: SYSTEM_PROMPT,
          messages: [{ role: "user", content: userContent }]
        })
      });
      if (!response.ok) throw new Error("Serverless not available");
      data = await response.json();
    } catch (e) {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 300,
          system: SYSTEM_PROMPT,
          messages: [{ role: "user", content: userContent }]
        })
      });
      if (!response.ok) throw new Error("Direct API not available");
      data = await response.json();
    }

    const mirandaText = data.content
      .filter(item => item.type === "text")
      .map(item => item.text)
      .join(" ");

    currentResponse = mirandaText || getFallback();
  } catch (err) {
    console.error("API error:", err);
    currentResponse = getFallback();
  }

  document.getElementById('verdict-text').textContent = '\u201C' + currentResponse + '\u201D';
  showScreen('verdict');
  setTimeout(() => {
    document.getElementById('verdict-card').classList.add('revealed');
  }, 100);
}

function handleShare() {
  const shareText = 'Miranda says:\n\n\u201C' + currentResponse + '\u201D\n\nGet judged \u2192 miranda.app';
  navigator.clipboard.writeText(shareText).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.style.borderColor = 'var(--ink)';
    btn.style.color = 'var(--ink)';
    setTimeout(() => { btn.style.borderColor = ''; btn.style.color = ''; }, 2000);
  });
}

function handleShareSocial(platform) {
  const shareText = encodeURIComponent('Miranda says: \u201C' + currentResponse + '\u201D\n\nGet judged \u2192 miranda.app');
  const shareUrl = encodeURIComponent('https://miranda.app');
  const urls = {
    instagram: 'https://www.instagram.com/',
    tiktok: 'https://www.tiktok.com/',
    x: 'https://x.com/intent/post?text=' + shareText,
    threads: 'https://www.threads.net/intent/post?text=' + shareText,
  };
  if (urls[platform]) window.open(urls[platform], '_blank');
}

function handleReset() {
  document.getElementById('verdict-card').classList.remove('revealed');
  setTimeout(() => {
    document.getElementById('user-input').value = '';
    imageBase64 = null;
    document.getElementById('image-preview-container').style.display = 'none';
    document.getElementById('file-input').value = '';
    updateSubmitState();
    showScreen('input');
  }, 300);
}
</script>
